name: Update Subscriptions

on:
  workflow_dispatch:
  schedule:
    - cron: "10 2 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ensure GH token exists
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_TOKEN secret is required" >&2
            exit 1
          fi

      - name: Discover and build subscriptions
        id: build_subscriptions
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set +e
          timeout 10m clash-nodes run
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "should_commit=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$status" -eq 124 ]; then
            echo "clash-nodes run timed out after 10 minutes"
            echo "should_commit=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_commit=false" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Commit output changes
        if: ${{ always() && steps.build_subscriptions.outputs.should_commit == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output
          if git diff --cached --quiet; then
            echo "No changes in output/"
            exit 0
          fi
          git commit -m "chore: update output"
          git push
